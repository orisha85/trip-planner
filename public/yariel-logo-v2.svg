<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: warm cream like the trip organizer -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EFE6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE4D6;stop-opacity:1" />
    </linearGradient>

    <!-- Letter fill: deep warm brown (like the "France + Spain" heading) -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1A0E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0F07;stop-opacity:1" />
    </linearGradient>

    <!-- Accent: terracotta/orange like the "NEW BOOKING" button & italic -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4541A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8420F;stop-opacity:1" />
    </linearGradient>

    <!-- Soft shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#8B5A2B" flood-opacity="0.18"/>
    </filter>

    <!-- Very subtle warm glow -->
    <filter id="warmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle warm grain texture via feTurbulence -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#C8A882" opacity="0.07" filter="url(#grain)"/>

  <!-- Geometric accent: thin terracotta arc top-right -->
  <circle cx="860" cy="164" r="300" fill="none" stroke="#D4541A" stroke-width="2" opacity="0.18"/>
  <circle cx="860" cy="164" r="200" fill="none" stroke="#D4541A" stroke-width="1" opacity="0.10"/>

  <!-- Geometric accent: thin arc bottom-left -->
  <circle cx="164" cy="860" r="260" fill="none" stroke="#2C1A0E" stroke-width="1.5" opacity="0.08"/>

  <!-- Corner dots — terracotta -->
  <circle cx="152" cy="152" r="7" fill="#D4541A" opacity="0.45"/>
  <circle cx="185" cy="152" r="4.5" fill="#D4541A" opacity="0.25"/>
  <circle cx="152" cy="185" r="4.5" fill="#D4541A" opacity="0.25"/>

  <circle cx="872" cy="872" r="7" fill="#D4541A" opacity="0.45"/>
  <circle cx="905" cy="872" r="4.5" fill="#D4541A" opacity="0.22"/>
  <circle cx="872" cy="905" r="4.5" fill="#D4541A" opacity="0.22"/>

  <!--
    MY MONOGRAM — geometric construction
    M and Y are overlapped/interlocked as a single unified mark
    Center of canvas: 512, 512
    Total mark height: ~560px  (from y=232 to y=792)
    Total mark width: ~580px   (from x=212 to x=792)

    M: two outer legs + two inner V legs meeting at center bottom point
    Y: arms branching from top, stem going down — the Y stem is SHARED with the M center valley

    Strategy:
    - M occupies the left-to-center space (left outer leg, left inner leg)
    - Y's right arm and right outer leg of M overlap at the right
    - The Y stem becomes the center drop of the M
    - Color: M strokes = dark brown, Y strokes = terracotta accent
      with overlapping region blending naturally
  -->

  <g clip-path="url(#roundedClip)">

    <!-- === M LETTERFORM (dark brown) === -->
    <!-- M is built as 4 strokes: left outer | left inner diagonal | right inner diagonal | right outer -->
    <!-- Stroke width: 88px, rounded caps -->

    <!-- Left outer leg of M (vertical) -->
    <rect x="212" y="220" width="90" height="560" rx="12" fill="url(#letterGrad)" filter="url(#softShadow)"/>

    <!-- Left inner diagonal of M (goes from top-left down to center-bottom valley) -->
    <!-- From (257, 220) down-right to (512, 560) -->
    <polygon 
      points="212,220  302,220  557,580  512,640  422,640  212,280"
      fill="url(#letterGrad)"
    />

    <!-- Right inner diagonal of M (goes from center-bottom valley up to top-right) -->
    <!-- Mirror of left inner: from (512,560) up-right to (767,220) -->
    <polygon 
      points="512,640  602,640  812,280  812,220  722,220  467,580"
      fill="url(#letterGrad)"
    />

    <!-- Right outer leg of M (vertical) -->
    <rect x="722" y="220" width="90" height="560" rx="12" fill="url(#letterGrad)"/>

    <!-- === Y LETTERFORM (terracotta accent) overlaid === -->
    <!-- Y arms originate from same top width as M, arms angle inward to center -->
    <!-- Left arm: top-left area angling down-right to center -->
    <!-- Right arm: top-right area angling down-left to center -->
    <!-- Stem: center going straight down -->

    <!-- Y Left arm — from top-left, angling toward center (512, 490) -->
    <!-- Slightly inside M so the overlap is intentional & visible -->
    <polygon
      points="248,220  338,220  556,490  556,560  446,560  248,290"
      fill="url(#accentGrad)"
      opacity="0.92"
    />

    <!-- Y Right arm — from top-right, angling toward center (512,490) -->
    <polygon
      points="686,220  776,220  776,290  568,560  468,560  468,490"
      fill="url(#accentGrad)"
      opacity="0.92"
    />

    <!-- Y Stem — center drop from (512,490) to (512,792) -->
    <rect x="468" y="490" width="88" height="310" rx="10" fill="url(#accentGrad)" opacity="0.92"/>

    <!-- Highlight sliver on Y left arm for dimension -->
    <polygon
      points="248,220  290,220  530,490  490,490"
      fill="#E8784A"
      opacity="0.22"
    />

  </g>

  <!-- Thin terracotta baseline rule -->
  <rect x="212" y="830" width="600" height="3.5" rx="2" fill="#D4541A" opacity="0.4"/>

</svg>
